name: Abuse Triage

# Auto-closes external-contributor PRs whose author is on .github/abuse-denylist
# (maintainer-curated; the "ban"), with a templated comment + spam-check label.
# Maintainers and repo collaborators/members are never closed. See
# abuse-triage.js.
#
# pull_request_target so it can label/close fork PRs (a fork's pull_request
# token is read-only). Safe: it checks out only the trusted default branch
# (.github) -- never the PR head -- and runs NO PR code. It reads
# .github/abuse-denylist + .github/MAINTAINER from that trusted checkout (so a
# PR can't edit either list to change the outcome) and acts via the API. No
# secrets are used.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: abuse-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: >-
      github.repository == 'omnigent-ai/omnigent'
      && !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # Job-level permissions REPLACE the workflow-level block (they don't
      # merge), so contents:read must be restated here for actions/checkout.
      contents: read
      pull-requests: write   # close PRs
      issues: write          # labels + comment (PR labels/comments use the issues API)
    steps:
      - name: Check out .github from the trusted default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github
          persist-credentials: false
      - name: Triage PR against the abuse denylist
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          retries: 3
          script: |
            const script = require('./.github/workflows/abuse-triage.js');
            await script({ github, context, core });
